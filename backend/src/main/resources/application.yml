server:
  port: 8080
  servlet:
    context-path: /api

spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/graduation_project_management?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: root

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQL8Dialect

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 100MB

  data:
    redis:
      host: localhost
      port: 6379
      password: 
      database: 0

jwt:
  secret: graduation-project-management-system-jwt-secret-key-2024
  expiration: 86400000
  header: Authorization
  prefix: Bearer

logging:
  level:
    com.graduation: debug
    org.hibernate.SQL: debug

file:
  upload:
    path: ./uploads/
